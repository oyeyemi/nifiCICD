services:
  nifi:
    image: apache/nifi:2.10.0
    container_name: nifi
    hostname: ${NIFI_HOSTNAME:-nifi.local}
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      NIFI_WEB_HTTPS_HOST: 0.0.0.0
      NIFI_WEB_HTTPS_PORT: "8443"
      NIFI_WEB_PROXY_HOST: "${NIFI_HOSTNAME:-nifi.local}:8443,localhost:8443"

      # AUTH=tls triggers the image's secure.sh, which enables two-way SSL
      # and seeds authorizers.xml's Initial Admin Identity. secure.sh reads
      # its OWN fixed variable names below (KEYSTORE_PATH, etc.) - these
      # are NOT interchangeable with the generic NIFI_SECURITY_* vars,
      # which secure.sh does not read at all. The comments show which
      # nifi.properties key each one ultimately becomes.
      AUTH: tls
      KEYSTORE_PATH: /opt/certs/nifi-server.p12                # nifi.security.keystore
      KEYSTORE_TYPE: PKCS12                                     # nifi.security.keystoreType
      KEYSTORE_PASSWORD: ${KEYSTORE_PASSWORD}                   # nifi.security.keystorePasswd
      KEY_PASSWORD: ${KEY_PASSWORD}                             # nifi.security.keyPasswd
      TRUSTSTORE_PATH: /opt/certs/truststore.jks                # nifi.security.truststore
      TRUSTSTORE_TYPE: JKS                                      # nifi.security.truststoreType
      TRUSTSTORE_PASSWORD: ${TRUSTSTORE_PASSWORD}               # nifi.security.truststorePasswd
      # managed-authorizer is already NiFi's default identifier for the
      # file-based UserGroupProvider/AccessPolicyProvider, so this line
      # is not strictly required - it's set explicitly for clarity, and
      # to guarantee we're not left on a single-user-authorizer default.
      NIFI_SECURITY_USER_AUTHORIZER: managed-authorizer         # nifi.security.user.authorizer
      # NOTE: no login-identity-provider is set on purpose.
      # "single-user-provider" (username/password) would conflict with
      # certificate-based login - two-way TLS doesn't use a login
      # identity provider at all; NiFi reads the identity straight off
      # the client certificate presented during the TLS handshake.
      INITIAL_ADMIN_IDENTITY: ${INITIAL_ADMIN_IDENTITY}

      # --- Configuration best practices (per the NiFi Admin Guide) ---
      # Encrypts sensitive processor properties (passwords/tokens typed
      # into a flow later). The Admin Guide calls this out as the single
      # property you should always set explicitly rather than leave to
      # chance. Generated once by generate-certs.sh and preserved across
      # re-runs - losing this value makes anything already encrypted
      # with it unrecoverable, so back up .env somewhere safe.
      NIFI_SENSITIVE_PROPS_KEY: ${SENSITIVE_PROPS_KEY}

      # Content repository archiving - keeps deleted/superseded content
      # around briefly for replay via the Provenance UI, bounded so it
      # can't fill the disk. Defaults are sane; set explicitly so the
      # bound is visible here rather than buried in image defaults.
      NIFI_CONTENT_REPOSITORY_ARCHIVE_ENABLED: "true"
      NIFI_CONTENT_REPOSITORY_ARCHIVE_MAX_RETENTION_PERIOD: "12 hours"
      NIFI_CONTENT_REPOSITORY_ARCHIVE_MAX_USAGE_PERCENTAGE: "50%"

      # Provenance repository - how long/how much lineage history to
      # retain. 2 GB / 48h gives a reasonable window for a home lab
      # without either value being the sole limiting factor day-to-day.
      NIFI_PROVENANCE_REPOSITORY_MAX_STORAGE_TIME: "48 hours"
      NIFI_PROVENANCE_REPOSITORY_MAX_STORAGE_SIZE: "2 GB"

      # Caps how many flow.xml.gz backups accumulate in conf/archive/ -
      # unbounded by default, which quietly grows forever otherwise.
      NIFI_FLOW_CONFIGURATION_ARCHIVE_MAX_COUNT: "10"

      NIFI_JVM_HEAP_INIT: 1g
      NIFI_JVM_HEAP_MAX: 2g
    volumes:
      - ./certs:/opt/certs:ro
      - nifi_database_repository:/opt/nifi/nifi-current/database_repository
      - nifi_flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
      - nifi_content_repository:/opt/nifi/nifi-current/content_repository
      - nifi_provenance_repository:/opt/nifi/nifi-current/provenance_repository
      - nifi_state:/opt/nifi/nifi-current/state
      - nifi_conf:/opt/nifi/nifi-current/conf
      - nifi_logs:/opt/nifi/nifi-current/logs
    # The NiFi Admin Guide recommends raising these beyond typical Docker
    # defaults - NiFi can open many files/threads across its repositories
    # and processor thread pools, and the low defaults can cause "Too
    # many open files" errors under real load even though everything
    # looks fine at idle.
    ulimits:
      nofile:
        soft: 50000
        hard: 50000
      nproc:
        soft: 10000
        hard: 10000
    # Caps total container memory so non-heap JVM memory (metaspace,
    # direct buffers, native libs) plus the JVM heap itself can't exceed
    # what the host can actually give it. Should be comfortably above
    # NIFI_JVM_HEAP_MAX (2g) to leave room for that overhead - adjust to
    # whatever your ZBook can spare.
    mem_limit: 3g
    extra_hosts:
      - "${NIFI_HOSTNAME:-nifi.local}:127.0.0.1"
    healthcheck:
      # Avoids depending on curl (which some NiFi base images omit) and
      # avoids interpreting HTTP status codes at all. This just confirms
      # something is actually listening and accepting TCP connections on
      # 8443, using only bash's built-in /dev/tcp - present in every shell
      # this image ships, since start.sh itself is a bash script.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8443' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  nifi_database_repository:
  nifi_flowfile_repository:
  nifi_content_repository:
  nifi_provenance_repository:
  nifi_state:
  nifi_conf:
  nifi_logs:
